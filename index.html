<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Money" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Lightweight personal money tracker" />
  <title>Money Tracker</title>

  <!-- Inline PWA manifest -->
  <script>
    const manifestData = {
      name: "Money Tracker",
      short_name: "Money",
      description: "Lightweight personal money tracker",
      start_url: "./",
      display: "standalone",
      background_color: "#0f0f0f",
      theme_color: "#0f0f0f",
      icons: [
        { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322c55e'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E💵%3C/text%3E%3C/svg%3E", sizes: "any", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], { type: "application/json" });
    const manifestURL = URL.createObjectURL(blob);
    document.write(`<link rel="manifest" href="${manifestURL}" />`);
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #242424;
      --border:   #2e2e2e;
      --text:     #f0f0f0;
      --muted:    #888;
      --green:    #22c55e;
      --red:      #ef4444;
      --blue:     #3b82f6;
      --amber:    #f59e0b;
      --radius:   14px;
      --safe-b:   env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 20px 16px 0;
      flex-shrink: 0;
    }

    .app-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Account pill row ── */
    .account-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .account-scroll::-webkit-scrollbar { display: none; }

    .acct-pill {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .acct-pill.active {
      border-color: var(--green);
      color: var(--green);
      background: rgba(34,197,94,.1);
    }
    .acct-pill.add-btn {
      border-style: dashed;
      color: var(--muted);
    }
    .acct-pill.group-pill {
      font-weight: 600;
    }
    .sub-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 6px 0 2px 10px;
      border-left: 2px solid var(--border);
      margin-top: 6px;
      scrollbar-width: none;
    }
    .sub-scroll::-webkit-scrollbar { display: none; }
    .acct-pill.sub {
      font-size: 12px;
      padding: 5px 11px;
      color: var(--muted);
    }

    /* ── Balance card ── */
    .balance-card {
      margin: 16px 0 0;
      padding: 20px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
    }

    .balance-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    .balance-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .balance-amount {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--text);
      flex: 1;
    }

    .balance-amount.negative { color: var(--red); }

    .balance-edit-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .balance-edit-btn:active { opacity: .7; }

    .acct-actions {
      position: absolute;
      top: 12px;
      right: 14px;
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .icon-btn:active { background: var(--surface2); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      margin-top: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 9px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .tab.active {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      padding-bottom: calc(16px + var(--safe-b));
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── Add form ── */
    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .type-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 3px;
    }

    .type-btn {
      flex: 1;
      padding: 9px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
    }
    .type-btn.income.active  { background: rgba(34,197,94,.2);  color: var(--green); }
    .type-btn.expense.active { background: rgba(239,68,68,.2);  color: var(--red);   }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
    }

    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--green);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .submit-btn:active { opacity: .8; }

    /* ── Category chips ── */
    .category-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .cat-chip {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .cat-chip.active {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(59,130,246,.12);
    }
    .cat-badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      margin-left: 5px;
      vertical-align: middle;
    }

    /* ── Transaction list ── */
    .section-header {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 4px 0 8px;
    }

    .tx-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tx-item:active { border-color: var(--blue); }

    .tx-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .tx-icon.income  { background: rgba(34,197,94,.15); }
    .tx-icon.expense { background: rgba(239,68,68,.15); }

    .tx-info { flex: 1; min-width: 0; }
    .tx-desc {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .tx-amount {
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .tx-amount.income  { color: var(--green); }
    .tx-amount.expense { color: var(--red);   }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 14px;
    }
    .empty-state .emoji { font-size: 40px; display: block; margin-bottom: 10px; }

    /* ── Settings tab ── */
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .settings-row:last-child { border-bottom: none; }

    .settings-label { font-size: 14px; font-weight: 500; }
    .settings-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .action-btn {
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }
    .action-btn:active { opacity: .7; }
    .action-btn.danger { border-color: var(--red); color: var(--red); }

    /* ── Modal overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      padding: 0 0 var(--safe-b);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border);
      padding: 20px 16px;
      padding-bottom: calc(20px + var(--safe-b));
      transform: translateY(30px);
      transition: transform .2s;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .overlay.open .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto -6px;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
    }

    .sheet-actions {
      display: flex;
      gap: 8px;
    }

    .btn-primary {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-danger {
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      background: rgba(239,68,68,.15);
      color: var(--red);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="app-title">Money Tracker</div>
    <div id="acctPills"></div>
    <div class="balance-card" id="balanceCard">
      <div class="acct-actions">
        <button class="icon-btn" onclick="openRenameAccount()" title="Rename account">✏️</button>
        <button class="icon-btn" onclick="confirmDeleteAccount()" title="Delete account">🗑️</button>
      </div>
      <div class="balance-label" id="balanceLabel">Total Balance</div>
      <div class="balance-row">
        <div class="balance-amount" id="balanceAmount">$0.00</div>
        <button class="balance-edit-btn" onclick="openCorrectBalance()">Correct Balance</button>
      </div>
    </div>
    <div class="tabs" style="margin: 12px 0 0;">
      <button class="tab active" onclick="setTab('add')">+ Add</button>
      <button class="tab" onclick="setTab('txns')">Transactions</button>
      <button class="tab" onclick="setTab('settings')">Settings</button>
    </div>
  </header>

  <div class="scroll-area" id="mainContent"></div>
</div>

<!-- New Account Sheet -->
<div class="overlay" id="newAcctOverlay" onclick="closeNewAcctIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">New Account</div>
    <div class="field-group">
      <label>Account Name</label>
      <input type="text" id="newAcctName" placeholder="e.g. Checking, Savings, Cash..." />
    </div>
    <div class="field-group">
      <label>Group</label>
      <select id="newAcctParent"></select>
    </div>
    <div class="field-group" id="newGroupNameField" style="display:none">
      <label>New Group Name</label>
      <input type="text" id="newGroupName" placeholder="e.g. Chase, Bank of America..." />
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeNewAcct()">Cancel</button>
      <button class="btn-primary" onclick="confirmNewAcct()">Add</button>
    </div>
  </div>
</div>

<!-- Edit Transaction Sheet -->
<div class="overlay" id="editOverlay" onclick="closeEditIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Edit Transaction</div>

    <div class="type-toggle">
      <button class="type-btn income" id="editTypeIncome" onclick="setEditType('income')">↑ Income</button>
      <button class="type-btn expense" id="editTypeExpense" onclick="setEditType('expense')">↓ Expense</button>
    </div>

    <div class="field-group">
      <label>Amount ($)</label>
      <input type="number" id="editAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal" />
    </div>

    <div class="row-2">
      <div class="field-group">
        <label>Account</label>
        <select id="editAccount"></select>
      </div>
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="editDate" />
      </div>
    </div>

    <div class="field-group">
      <label>Category</label>
      <div class="category-chips" id="editCategoryChips"></div>
    </div>

    <div class="field-group">
      <label>Description (optional notes)</label>
      <input type="text" id="editDesc" placeholder="Extra notes..." />
    </div>

    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-danger" onclick="deleteTransaction()">Delete</button>
      <button class="btn-primary" onclick="saveEditTransaction()">Save</button>
    </div>
  </div>
</div>

<!-- Generic prompt sheet -->
<div class="overlay" id="promptOverlay" onclick="closePromptIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="promptTitle">Enter value</div>
    <div class="field-group">
      <label id="promptLabel">Value</label>
      <input id="promptInput" type="text" />
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closePrompt()">Cancel</button>
      <button class="btn-primary" onclick="confirmPrompt()">Confirm</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const DEFAULT_DATA = {
  accounts: [],
  transactions: []
};

function today(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0, 10);
}

let data = JSON.parse(localStorage.getItem("mt_data") || "null") || JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentAccountId = data.accounts.length > 0 ? "__total__" : null;
let currentTab = "add";
let editingTxId = null;
let editType = "expense";
let promptCallback = null;

function save() {
  localStorage.setItem("mt_data", JSON.stringify(data));
}

// ─── Derived ─────────────────────────────────────────────────────────────────
function getAccount(id) { return data.accounts.find(a => a.id === id); }
function currentAccount() { return getAccount(currentAccountId); }

function leafAccounts() { return data.accounts.filter(a => !a.isGroup); }

function getAccountBalance(id) {
  const acct = getAccount(id);
  if (!acct) return 0;
  if (acct.isGroup) {
    return data.accounts.filter(a => a.parentId === id).reduce((s, a) => s + (a.balance || 0), 0);
  }
  return acct.balance || 0;
}

function leafAccountOptions(selectedId) {
  return leafAccounts().map(a => {
    const parent = a.parentId ? getAccount(a.parentId) : null;
    const label = parent ? `${esc(parent.name)} › ${esc(a.name)}` : esc(a.name);
    return `<option value="${a.id}" ${a.id === selectedId ? "selected" : ""}>${label}</option>`;
  }).join("");
}

function isTotalView() { return currentAccountId === "__total__"; }

function currentTxns() {
  if (isTotalView()) {
    return [...data.transactions].sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  }
  const acct = currentAccount();
  if (!acct) return [];
  let ids;
  if (acct.isGroup) {
    ids = new Set(data.accounts.filter(a => a.parentId === acct.id).map(a => a.id));
  } else {
    ids = new Set([currentAccountId]);
  }
  return data.transactions
    .filter(t => ids.has(t.accountId))
    .sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderPills();
  renderBalance();
  renderContent();
}

function renderPills() {
  const container = document.getElementById("acctPills");
  const acct = currentAccount();

  // Determine which group's sub-accounts to show in the second row
  let activeGroupId = null;
  if (acct) {
    if (acct.isGroup) activeGroupId = acct.id;
    else if (acct.parentId) activeGroupId = acct.parentId;
  }

  // Top row: "All Accounts" + groups + standalone accounts
  const topItems = data.accounts.filter(a => !a.parentId);
  const totalPill = data.accounts.length
    ? `<button class="acct-pill ${isTotalView() ? "active" : ""}" onclick="switchAccount('__total__')">All Accounts</button>`
    : "";
  const topPills = topItems.map(a => {
    const isActive = !isTotalView() && (a.id === currentAccountId || acct?.parentId === a.id);
    return `<button class="acct-pill ${isActive ? "active" : ""} ${a.isGroup ? "group-pill" : ""}" onclick="switchAccount('${a.id}')">${a.name}</button>`;
  }).join("");

  // Sub-account row
  let subRow = "";
  if (activeGroupId) {
    const children = data.accounts.filter(a => a.parentId === activeGroupId);
    const subPills = children.map(a =>
      `<button class="acct-pill sub ${a.id === currentAccountId ? "active" : ""}" onclick="switchAccount('${a.id}')">${a.name}</button>`
    ).join("");
    subRow = `<div class="sub-scroll">${subPills}<button class="acct-pill sub add-btn" onclick="addAccount('${activeGroupId}')">+ Add</button></div>`;
  }

  container.innerHTML =
    `<div class="account-scroll">${topPills}<button class="acct-pill add-btn" onclick="addAccount()">+ New</button></div>` +
    subRow;
}

function renderBalance() {
  const acct = currentAccount();
  const el = document.getElementById("balanceAmount");
  if (!acct) {
    el.textContent = "$0.00";
    el.className = "balance-amount";
    document.getElementById("balanceLabel").textContent = "No accounts yet";
    return;
  }
  const bal = getAccountBalance(acct.id);
  el.textContent = fmt(bal);
  el.className = "balance-amount" + (bal < 0 ? " negative" : "");
  document.getElementById("balanceLabel").textContent = acct.isGroup ? `${acct.name} (total)` : acct.name;
}

function renderContent() {
  const el = document.getElementById("mainContent");
  if (currentTab === "add") {
    el.innerHTML = buildAddForm();
    addCategoryState = "";
    buildCategoryChips(addTypeState, addCategoryState, "setAddCategory", "addCategoryChips");
  } else if (currentTab === "txns") {
    el.innerHTML = buildTxnList();
  } else {
    el.innerHTML = buildSettings();
  }
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t, i) => {
    t.classList.toggle("active", ["add","txns","settings"][i] === tab);
  });
  renderContent();
}

// ─── Add Form ────────────────────────────────────────────────────────────────
function buildAddForm() {
  const leaves = leafAccounts();
  if (!leaves.length) return `
    <div class="empty-state">
      <span class="emoji">🏦</span>
      No accounts yet.<br/>Tap <b>+ New</b> above to add one.
    </div>`;

  const curAcct = currentAccount();
  const defaultId = (!curAcct || curAcct.isGroup)
    ? (curAcct ? data.accounts.find(a => a.parentId === curAcct.id)?.id : null) ?? leaves[0].id
    : currentAccountId;

  return `
  <div class="form-card">
    <div class="type-toggle">
      <button class="type-btn income active" id="addTypeIncome"  onclick="setAddType('income')">↑ Income</button>
      <button class="type-btn expense"       id="addTypeExpense" onclick="setAddType('expense')">↓ Expense</button>
    </div>

    <div class="field-group">
      <label>Amount ($)</label>
      <input type="number" id="addAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal" />
    </div>

    <div class="row-2">
      <div class="field-group">
        <label>Account</label>
        <select id="addAccount">${leafAccountOptions(defaultId)}</select>
      </div>
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="addDate" value="${today()}" />
      </div>
    </div>

    <div class="field-group">
      <label>Category</label>
      <div class="category-chips" id="addCategoryChips"></div>
    </div>

    <div class="field-group">
      <label>Description (optional notes)</label>
      <input type="text" id="addDesc" placeholder="Extra notes..." />
    </div>

    <button class="submit-btn" onclick="submitTransaction()">Add Transaction</button>
  </div>`;
}

const EXPENSE_CATEGORIES = [
  "🛒 Groceries","⛽ Gas","🍽️ Dining","🏠 Rent","🛍️ Shopping",
  "📚 Education","🎬 Entertainment","💊 Healthcare","🚌 Transport",
  "💡 Utilities","📱 Subscriptions","✈️ Travel","💰 Savings","📝 Other"
];
const INCOME_CATEGORIES = [
  "💵 Paycheck","💸 Transfer","🎁 Gift","💹 Investment","🏦 Deposit","📝 Other"
];

let addTypeState = "income";
let addCategoryState = "";
let editCategoryState = "";

function buildCategoryChips(type, selected, onClickFn, containerId) {
  const cats = type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = cats.map(c =>
    `<button type="button" class="cat-chip ${c === selected ? "active" : ""}" onclick="${onClickFn}('${c.replace(/'/g,"\\'")}', '${containerId}')">${c}</button>`
  ).join("");
}

function setAddCategory(cat, containerId) {
  addCategoryState = addCategoryState === cat ? "" : cat;
  buildCategoryChips(addTypeState, addCategoryState, "setAddCategory", containerId);
}

function setEditCategory(cat, containerId) {
  editCategoryState = editCategoryState === cat ? "" : cat;
  buildCategoryChips(editType, editCategoryState, "setEditCategory", containerId);
}

function setAddType(type) {
  addTypeState = type;
  addCategoryState = "";
  document.getElementById("addTypeIncome") ?.classList.toggle("active", type === "income");
  document.getElementById("addTypeExpense")?.classList.toggle("active", type === "expense");
  buildCategoryChips(type, addCategoryState, "setAddCategory", "addCategoryChips");
}

function submitTransaction() {
  const amount = parseFloat(document.getElementById("addAmount").value);
  const desc   = document.getElementById("addDesc").value.trim();
  const acctId = document.getElementById("addAccount").value;
  const date   = document.getElementById("addDate").value || today();

  if (!amount || amount <= 0) { alert("Enter a valid amount."); return; }
  if (!addCategoryState && !desc) { alert("Select a category or enter a description."); return; }

  const tx = {
    id: "t" + Date.now(),
    accountId: acctId,
    type: addTypeState,
    amount,
    category: addCategoryState,
    desc,
    date
  };

  data.transactions.push(tx);
  const acct = getAccount(acctId);
  acct.balance += (addTypeState === "income" ? 1 : -1) * amount;
  save();
  currentAccountId = acctId;
  setTab("txns");
  render();
}

// ─── Transaction List ─────────────────────────────────────────────────────────
function buildTxnList() {
  const txns = currentTxns();
  if (!txns.length) return `
    <div class="empty-state">
      <span class="emoji">📭</span>
      No transactions yet.<br/>Tap <b>+ Add</b> to log one.
    </div>`;

  const isGroupView = currentAccount()?.isGroup;
  const items = txns.map(t => {
    const icon = t.type === "income" ? "↑" : "↓";
    const sign = t.type === "income" ? "+" : "−";
    const subAcctName = isGroupView ? ` · ${esc(getAccount(t.accountId)?.name ?? "")}` : "";
    const label = t.category || t.desc || "Unnamed";
    const notesLine = (t.category && t.desc) ? `<div class="tx-meta" style="margin-top:1px">${esc(t.desc)}</div>` : "";
    return `
    <div class="tx-item" onclick="openEdit('${t.id}')">
      <div class="tx-icon ${t.type}">${icon}</div>
      <div class="tx-info">
        <div class="tx-desc">${esc(label)}</div>
        <div class="tx-meta">${fmtDate(t.date)}${subAcctName}</div>
        ${notesLine}
      </div>
      <div class="tx-amount ${t.type}">${sign}${fmt(t.amount)}</div>
    </div>`;
  }).join("");

  return `
    <div class="section-header">${txns.length} transaction${txns.length !== 1 ? "s" : ""}</div>
    <div class="tx-list">${items}</div>`;
}

// ─── Edit Sheet ───────────────────────────────────────────────────────────────
function openEdit(txId) {
  const tx = data.transactions.find(t => t.id === txId);
  if (!tx) return;
  editingTxId = txId;
  editType = tx.type;

  editCategoryState = tx.category || "";
  document.getElementById("editAmount").value  = tx.amount;
  document.getElementById("editDesc").value    = tx.desc || "";
  document.getElementById("editDate").value    = tx.date;

  const acctSel = document.getElementById("editAccount");
  acctSel.innerHTML = leafAccountOptions(tx.accountId);

  document.getElementById("editTypeIncome") .classList.toggle("active", tx.type === "income");
  document.getElementById("editTypeExpense").classList.toggle("active", tx.type === "expense");
  buildCategoryChips(tx.type, editCategoryState, "setEditCategory", "editCategoryChips");

  document.getElementById("editOverlay").classList.add("open");
}

function setEditType(type) {
  editType = type;
  editCategoryState = "";
  document.getElementById("editTypeIncome") .classList.toggle("active", type === "income");
  document.getElementById("editTypeExpense").classList.toggle("active", type === "expense");
  buildCategoryChips(type, editCategoryState, "setEditCategory", "editCategoryChips");
}

function closeEdit() { document.getElementById("editOverlay").classList.remove("open"); }
function closeEditIfBg(e) { if (e.target.id === "editOverlay") closeEdit(); }

function saveEditTransaction() {
  const tx = data.transactions.find(t => t.id === editingTxId);
  if (!tx) return;

  const newAmount  = parseFloat(document.getElementById("editAmount").value);
  const newDesc    = document.getElementById("editDesc").value.trim();
  const newAcctId  = document.getElementById("editAccount").value;
  const newDate    = document.getElementById("editDate").value || today();

  if (!newAmount || newAmount <= 0) { alert("Enter a valid amount."); return; }

  // Reverse old effect
  const oldAcct = getAccount(tx.accountId);
  oldAcct.balance -= (tx.type === "income" ? 1 : -1) * tx.amount;

  // Apply new effect
  tx.type      = editType;
  tx.amount    = newAmount;
  tx.category  = editCategoryState;
  tx.desc      = newDesc;
  tx.accountId = newAcctId;
  tx.date      = newDate;

  const newAcct = getAccount(newAcctId);
  newAcct.balance += (editType === "income" ? 1 : -1) * newAmount;

  save();
  closeEdit();
  render();
}

function deleteTransaction() {
  if (!confirm("Delete this transaction?")) return;
  const tx = data.transactions.find(t => t.id === editingTxId);
  if (!tx) return;

  const acct = getAccount(tx.accountId);
  acct.balance -= (tx.type === "income" ? 1 : -1) * tx.amount;

  data.transactions = data.transactions.filter(t => t.id !== editingTxId);
  save();
  closeEdit();
  render();
}

// ─── Correct Balance ──────────────────────────────────────────────────────────
function openCorrectBalance() {
  const acct = currentAccount();
  if (!acct) return;
  if (acct.isGroup) { alert("Select a specific sub-account to correct its balance."); return; }
  openPrompt(
    "Correct Balance",
    `New balance for ${acct.name} ($)`,
    String(acct.balance),
    "number",
    (val) => {
      const n = parseFloat(val);
      if (isNaN(n)) { alert("Enter a valid number."); return; }
      acct.balance = n;
      save();
      renderBalance();
    }
  );
}

// ─── Account management ───────────────────────────────────────────────────────
function addAccount(preselectedGroupId = null) {
  const sel = document.getElementById("newAcctParent");
  const groups = data.accounts.filter(a => a.isGroup);
  sel.innerHTML =
    `<option value="">— Standalone account —</option>` +
    groups.map(g => `<option value="${g.id}">${g.name}</option>`).join("") +
    `<option value="__new__">+ Create new group…</option>`;
  if (preselectedGroupId) sel.value = preselectedGroupId;
  document.getElementById("newAcctName").value = "";
  document.getElementById("newGroupName").value = "";
  document.getElementById("newGroupNameField").style.display = preselectedGroupId ? "none" : "none";
  document.getElementById("newAcctOverlay").classList.add("open");
  setTimeout(() => document.getElementById("newAcctName").focus(), 250);
}

function closeNewAcct() { document.getElementById("newAcctOverlay").classList.remove("open"); }
function closeNewAcctIfBg(e) { if (e.target.id === "newAcctOverlay") closeNewAcct(); }

document.getElementById("newAcctParent").addEventListener("change", function () {
  document.getElementById("newGroupNameField").style.display = this.value === "__new__" ? "" : "none";
});

function confirmNewAcct() {
  const name = document.getElementById("newAcctName").value.trim();
  if (!name) { alert("Enter an account name."); return; }

  let parentId = document.getElementById("newAcctParent").value;

  if (parentId === "__new__") {
    const groupName = document.getElementById("newGroupName").value.trim();
    if (!groupName) { alert("Enter a group name."); return; }
    const gid = "g" + Date.now();
    data.accounts.push({ id: gid, name: groupName, parentId: null, isGroup: true });
    parentId = gid;
  }

  const id = "a" + (Date.now() + 1);
  data.accounts.push({ id, name, parentId: parentId || null, isGroup: false, balance: 0 });
  currentAccountId = id;
  save();
  closeNewAcct();
  render();
}

function switchAccount(id) {
  currentAccountId = id;
  render();
}

function openRenameAccount() {
  const acct = currentAccount();
  if (!acct) return;
  openPrompt("Rename Account", "New name", acct.name, "text", (name) => {
    if (!name.trim()) return;
    acct.name = name.trim();
    save();
    render();
  });
}

function confirmDeleteAccount() {
  const acct = currentAccount();
  if (!acct) return;
  if (acct.isGroup) {
    const children = data.accounts.filter(a => a.parentId === acct.id);
    const msg = children.length
      ? `Delete "${acct.name}" group and its ${children.length} sub-account(s) with all their transactions?`
      : `Delete "${acct.name}" group?`;
    if (!confirm(msg)) return;
    const childIds = new Set(children.map(c => c.id));
    data.transactions = data.transactions.filter(t => !childIds.has(t.accountId));
    data.accounts = data.accounts.filter(a => a.id !== acct.id && a.parentId !== acct.id);
  } else {
    if (!confirm(`Delete "${acct.name}" and all its transactions?`)) return;
    data.transactions = data.transactions.filter(t => t.accountId !== acct.id);
    data.accounts = data.accounts.filter(a => a.id !== acct.id);
  }
  currentAccountId = data.accounts[0]?.id ?? null;
  save();
  render();
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function buildSettings() {
  const accts = data.accounts.map(a => {
    if (a.isGroup) {
      return `<div class="settings-row">
        <div>
          <div class="settings-label">📁 ${esc(a.name)}</div>
          <div class="settings-sub">${fmt(getAccountBalance(a.id))} total</div>
        </div>
      </div>`;
    }
    const parent = a.parentId ? getAccount(a.parentId) : null;
    const label = parent ? `${esc(parent.name)} › ${esc(a.name)}` : esc(a.name);
    return `<div class="settings-row">
      <div>
        <div class="settings-label">${label}</div>
        <div class="settings-sub">${fmt(a.balance || 0)}</div>
      </div>
      <button class="action-btn" onclick="switchAndCorrect('${a.id}')">Edit Balance</button>
    </div>`;
  }).join("");

  return `
  <div class="settings-section">
    <div class="settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-label">Export Data</div>
          <div class="settings-sub">Download all accounts & transactions as JSON</div>
        </div>
        <button class="action-btn" onclick="exportData()">Export</button>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-label">Import Data</div>
          <div class="settings-sub">Restore from a JSON backup file</div>
        </div>
        <button class="action-btn" onclick="triggerImport()">Import</button>
      </div>
    </div>

    <div style="font-size:12px;color:var(--muted);padding:0 2px;">Account Balances</div>
    <div class="settings-card">${accts}</div>

    <div class="settings-card">
      <div class="settings-row">
        <div>
          <div class="settings-label" style="color:var(--red)">Clear All Data</div>
          <div class="settings-sub">Wipes everything and reloads defaults</div>
        </div>
        <button class="action-btn danger" onclick="clearData()">Reset</button>
      </div>
    </div>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)" />`;
}

function switchAndCorrect(id) {
  currentAccountId = id;
  render();
  openCorrectBalance();
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `money-tracker-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function triggerImport() {
  document.getElementById("importFile")?.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.accounts || !imported.transactions) throw new Error("Invalid format");
      if (!confirm("This will replace all current data. Continue?")) return;
      data = imported;
      currentAccountId = data.accounts[0]?.id;
      save();
      render();
      alert("Import successful!");
    } catch {
      alert("Failed to import. Make sure the file is a valid Money Tracker JSON backup.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function clearData() {
  if (!confirm("Clear all data? This cannot be undone.")) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  currentAccountId = null;
  save();
  render();
}

// ─── Generic Prompt Sheet ────────────────────────────────────────────────────
function openPrompt(title, label, value, inputType, callback) {
  document.getElementById("promptTitle").textContent = title;
  document.getElementById("promptLabel").textContent = label;
  const inp = document.getElementById("promptInput");
  inp.type  = inputType;
  inp.value = value;
  promptCallback = callback;
  document.getElementById("promptOverlay").classList.add("open");
  setTimeout(() => inp.focus(), 250);
}

function closePrompt() { document.getElementById("promptOverlay").classList.remove("open"); }
function closePromptIfBg(e) { if (e.target.id === "promptOverlay") closePrompt(); }

function confirmPrompt() {
  const val = document.getElementById("promptInput").value;
  closePrompt();
  if (promptCallback) { promptCallback(val); promptCallback = null; }
}

document.getElementById("promptInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") confirmPrompt();
});

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmt(n) {
  return "$" + Math.abs(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(s) {
  if (!s) return "";
  const [y, m, d] = s.split("-");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[+m - 1]} ${+d}, ${y}`;
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
